<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>容量的換算與比較 - 題庫輪替版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            max-height: 95vh;
            overflow: hidden;
        }
        .scroll-area {
            overflow-y: auto !important;
            flex-grow: 1;
            height: 100%;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:active {
            transform: scale(0.97);
        }
        .calc-btn {
            transition: all 0.2s;
        }
        .calc-btn:active {
            background-color: #166534;
            transform: translateY(1px);
        }
        /* 回饋動畫 */
        .feedback-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #answerInput {
            -webkit-text-fill-color: #1f2937;
            color: #1f2937;
            opacity: 1;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="app" class="w-full max-w-5xl glass-card p-6 md:p-8 transition-all duration-300 min-h-[600px] flex flex-col">
        <!-- 動態內容渲染處 -->
    </div>

    <script>
        /**
         * 題庫數據管理
         */
        let conversionPool = [
            { q: "1 公升 250 毫升 = ( ) 毫升", a: "1250" },
            { q: "4 公升 80 毫升 = ( ) 毫升", a: "4080" },
            { q: "2070 毫升 = ( ) 公升 ( ) 毫升", a: "2,70" },
            { q: "5300 毫升 = ( ) 公升 ( ) 毫升", a: "5,300" },
            { q: "3005 毫升 = ( ) 公升 ( ) 毫升", a: "3,5" },
            { q: "6 公升 120 毫升 = ( ) 毫升", a: "6120" },
            { q: "8 公升 9 毫升 = ( ) 毫升", a: "8009" },
            { q: "7045 毫升 = ( ) 公升 ( ) 毫升", a: "7,45" },
            { q: "9210 毫升 = ( ) 公升 ( ) 毫升", a: "9,210" },
            { q: "1060 毫升 = ( ) 公升 ( ) 毫升", a: "1,60" },
            { q: "2 公升 400 毫升 = ( ) 毫升", a: "2400" },
            { q: "5 公升 15 毫升 = ( ) 毫升", a: "5015" },
            { q: "4180 毫升 = ( ) 公升 ( ) 毫升", a: "4,180" },
            { q: "8002 毫升 = ( ) 公升 ( ) 毫升", a: "8,2" },
            { q: "3600 毫升 = ( ) 公升 ( ) 毫升", a: "3,600" },
            { q: "7 公升 88 毫升 = ( ) 毫升", a: "7088" },
            { q: "9 公升 500 毫升 = ( ) 毫升", a: "9500" },
            { q: "1340 毫升 = ( ) 公升 ( ) 毫升", a: "1,340" },
            { q: "6077 毫升 = ( ) 公升 ( ) 毫升", a: "6,77" },
            { q: "2222 毫升 = ( ) 公升 ( ) 毫升", a: "2,222" },
            { q: "4 公升 9 毫升 = ( ) 毫升", a: "4009" },
            { q: "8 公升 720 毫升 = ( ) 毫升", a: "8720" },
            { q: "5050 毫升 = ( ) 公升 ( ) 毫升", a: "5,50" },
            { q: "3100 毫升 = ( ) 公升 ( ) 毫升", a: "3,100" },
            { q: "7900 毫升 = ( ) 公升 ( ) 毫升", a: "7,900" }
        ];

        let comparisonPool = [
            { q: "2300 毫升 ( ) 2 公升 30 毫升", a: ">" },
            { q: "5 公升 100 毫升 ( ) 5100 毫升", a: "=" },
            { q: "1090 毫升 ( ) 1 公升 9 毫升", a: ">" },
            { q: "4 公升 ( ) 3999 毫升", a: ">" },
            { q: "6006 毫升 ( ) 6 公升 60 毫升", a: "<" },
            { q: "3 公升 450 毫升 ( ) 3450 毫升", a: "=" },
            { q: "8200 毫升 ( ) 8 公升 20 毫升", a: ">" },
            { q: "7 公升 5 毫升 ( ) 7050 毫升", a: "<" },
            { q: "9111 毫升 ( ) 9 公升 111 毫升", a: "=" },
            { q: "1 公升 800 毫升 ( ) 1080 毫升", a: ">" },
            { q: "2002 毫升 ( ) 2 公升 2 毫升", a: "=" },
            { q: "5500 毫升 ( ) 5 公升 55 毫升", a: ">" },
            { q: "4 公升 10 毫升 ( ) 4100 毫升", a: "<" },
            { q: "3030 毫升 ( ) 3 公升 300 毫升", a: "<" },
            { q: "6 公升 2 毫升 ( ) 6002 毫升", a: "=" },
            { q: "8880 毫升 ( ) 8 公升 88 毫升", a: ">" },
            { q: "7 公升 70 毫升 ( ) 7700 毫升", a: "<" },
            { q: "9009 毫升 ( ) 9 公升 9 毫升", a: "=" },
            { q: "1250 毫升 ( ) 1 公升 25 毫升", a: ">" },
            { q: "4 公升 4 毫升 ( ) 4040 毫升", a: "<" },
            { q: "2 公升 90 毫升 ( ) 2090 毫升", a: "=" },
            { q: "5001 毫升 ( ) 5 公升", a: ">" },
            { q: "3 公升 150 毫升 ( ) 3150 毫升", a: "=" },
            { q: "8070 毫升 ( ) 8 公升 700 毫升", a: "<" },
            { q: "6990 毫升 ( ) 7 公升", a: "<" }
        ];

        let currentState = 'start'; 
        let currentGameQuestions = []; 
        let currentStepIndex = 0; 
        let score = 0;
        let userAnswers = [];
        let feedbackState = null; 
        let currentBatchIndex = 0; // 追蹤目前是第幾組 (0~4)

        function autoCalculateAnswer(text, type) {
            try {
                const cleanText = text.replace(/\s+/g, '');
                if (type === 'conversion') {
                    const beforeEqual = cleanText.split('=')[0];
                    if (!beforeEqual) return "";
                    if (beforeEqual.includes('公升') && beforeEqual.includes('毫升')) {
                        const lMatch = beforeEqual.match(/(\d+)公升/);
                        const mlMatch = beforeEqual.match(/公升(\d+)毫升/) || beforeEqual.match(/(\d+)毫升/);
                        const l = lMatch ? parseInt(lMatch[1]) : 0;
                        const ml = mlMatch ? parseInt(mlMatch[1]) : 0;
                        return (l * 1000 + ml).toString();
                    }
                    if (beforeEqual.includes('毫升')) {
                        const mlMatch = beforeEqual.match(/(\d+)毫升/);
                        if (mlMatch) {
                            const total = parseInt(mlMatch[1]);
                            return `${Math.floor(total/1000)},${total%1000}`;
                        }
                    }
                } else if (type === 'comparison') {
                    const parts = cleanText.split(/\(|\)/);
                    if (parts.length < 3) return "";
                    const parseValue = (str) => {
                        let total = 0;
                        const lMatch = str.match(/(\d+)公升/);
                        const mlMatch = str.match(/(\d+)毫升/);
                        if (lMatch) total += parseInt(lMatch[1]) * 1000;
                        if (mlMatch) {
                            if (str.includes('公升') && str.includes('毫升')) {
                                const subMl = str.match(/公升(\d+)毫升/);
                                if (subMl) total += parseInt(subMl[1]);
                            } else { total += parseInt(mlMatch[1]); }
                        }
                        return total;
                    };
                    const val1 = parseValue(parts[0]);
                    const val2 = parseValue(parts[2]);
                    return val1 > val2 ? ">" : (val1 < val2 ? "<" : "=");
                }
            } catch (e) { return ""; }
            return "";
        }

        function triggerUpdateAnswer(type, index) {
            const pool = type === 'conversion' ? conversionPool : comparisonPool;
            const questionText = pool[index].q;
            const newAns = autoCalculateAnswer(questionText, type);
            if (newAns !== "") {
                pool[index].a = newAns;
                const inputId = `ans-input-${type}-${index}`;
                const inputEl = document.getElementById(inputId);
                if (inputEl) {
                    inputEl.value = newAns;
                    inputEl.classList.add('bg-green-200');
                    setTimeout(() => inputEl.classList.remove('bg-green-200'), 500);
                }
            }
        }

        function handleQuestionTextChange(type, index, value) {
            const pool = type === 'conversion' ? conversionPool : comparisonPool;
            pool[index].q = value;
        }

        function updatePool(type, index, field, value) {
            const pool = type === 'conversion' ? conversionPool : comparisonPool;
            pool[index][field] = value;
        }

        function render() {
            const container = document.getElementById('app');
            
            if (currentState === 'start') {
                container.style.maxWidth = "42rem";
                container.innerHTML = `
                    <div class="text-center py-8 flex flex-col items-center justify-center flex-grow">
                        <div class="mb-6 inline-flex p-5 bg-green-50 rounded-3xl text-green-500 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                            </svg>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-800 mb-2">容量換算與比較</h1>
                        <p class="text-gray-500 mb-8 px-4 text-sm font-medium">固定題庫練習 (共有 5 組 50 題)</p>
                        
                        <div class="space-y-4 w-full max-w-sm">
                            <button onclick="startGame(0)" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-xl font-bold btn-hover shadow-lg">開始遊戲</button>
                            <button onclick="goSettings()" class="w-full border-2 border-green-100 text-green-600 py-3 rounded-2xl font-medium btn-hover flex items-center justify-center hover:bg-green-50">
                                進入題庫編輯器
                            </button>
                        </div>
                    </div>
                `;
            } else if (currentState === 'settings') {
                container.style.maxWidth = "64rem"; 
                const genInputs = (pool, type) => pool.map((q, i) => {
                    const isCurrentBatch = (i >= currentBatchIndex * 5 && i < (currentBatchIndex + 1) * 5);
                    return `
                        <div class="mb-4 p-4 bg-white rounded-2xl border ${isCurrentBatch ? 'border-green-400 ring-2 ring-green-100' : 'border-gray-100'} shadow-sm hover:border-green-200 transition-colors">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">題目 #${i+1}</span>
                                ${isCurrentBatch ? '<span class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full font-bold">下一輪出題範圍</span>' : ''}
                            </div>
                            <div class="flex gap-2 mb-2">
                                <input type="text" value="${q.q}" oninput="handleQuestionTextChange('${type}', ${i}, this.value)" class="flex-grow p-2 text-sm bg-gray-50 border border-gray-100 rounded-lg focus:ring-2 focus:ring-green-400 outline-none font-medium" placeholder="輸入題目內容">
                                <button onclick="triggerUpdateAnswer('${type}', ${i})" class="calc-btn px-3 py-1 bg-green-700 text-white text-[10px] font-bold rounded-lg shadow-sm hover:bg-green-800 whitespace-nowrap">計算答案</button>
                            </div>
                            <div class="flex items-center">
                                <span class="text-[10px] text-green-500 font-bold mr-2">正解:</span>
                                <input type="text" id="ans-input-${type}-${i}" value="${q.a}" onchange="updatePool('${type}', ${i}, 'a', this.value)" class="flex-grow p-2 text-sm bg-green-50 border-none rounded-lg text-green-700 font-bold focus:ring-2 focus:ring-green-400 outline-none transition-all duration-300">
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `
                    <div class="flex flex-col h-full overflow-hidden">
                        <div class="flex justify-between items-center mb-6 flex-shrink-0">
                            <div>
                                <h2 class="text-2xl font-bold text-gray-800">題庫編輯器</h2>
                                <p class="text-xs text-gray-400 mt-1">手動修改題目內容。框出的範圍是下一輪會出現的題目。</p>
                            </div>
                            <button onclick="goHome()" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold btn-hover">儲存並返回</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow min-h-0">
                            <div class="flex flex-col bg-blue-50/30 p-5 rounded-3xl border border-blue-100 overflow-hidden">
                                <h3 class="font-bold text-blue-700 mb-4 flex items-center px-1">容量換算池 (共25題)</h3>
                                <div class="scroll-area custom-scrollbar pr-1">${genInputs(conversionPool, 'conversion')}</div>
                            </div>
                            <div class="flex flex-col bg-orange-50/30 p-5 rounded-3xl border border-orange-100 overflow-hidden">
                                <h3 class="font-bold text-orange-700 mb-4 flex items-center px-1">容量比較池 (共25題)</h3>
                                <div class="scroll-area custom-scrollbar pr-1">${genInputs(comparisonPool, 'comparison')}</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentState === 'game') {
                container.style.maxWidth = "42rem";
                const q = currentGameQuestions[currentStepIndex];
                const isComparison = currentStepIndex >= 5;
                
                if (feedbackState) {
                    container.innerHTML = `
                        <div class="flex flex-col flex-grow justify-center items-center feedback-pop">
                            <div class="mb-6 p-8 rounded-full ${feedbackState.isCorrect ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    ${feedbackState.isCorrect ? 
                                        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />' : 
                                        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />'}
                                </svg>
                            </div>
                            <h2 class="text-4xl font-black mb-2 ${feedbackState.isCorrect ? 'text-green-600' : 'text-red-600'}">
                                ${feedbackState.isCorrect ? '太棒了！答對囉' : '不小心答錯囉'}
                            </h2>
                            ${!feedbackState.isCorrect ? `<p class="text-xl text-gray-500 mb-8 font-bold text-center">正確答案是：<br><span class="text-3xl text-red-600">${feedbackState.correctAnswer}</span></p>` : '<div class="mb-8"></div>'}
                            
                            <button onclick="nextStep()" class="w-full max-sm bg-gray-800 text-white py-5 rounded-3xl text-xl font-bold btn-hover shadow-xl">繼續下一題</button>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="flex flex-col flex-grow justify-center">
                        <div class="flex justify-between items-center mb-8">
                            <div class="flex flex-col">
                                <span class="px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest ${isComparison ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}">
                                    ${isComparison ? '容量比較' : '容量換算'}
                                </span>
                                <span class="text-[10px] text-gray-400 mt-1 font-bold">第 ${currentBatchIndex + 1} 組題目</span>
                            </div>
                            <div class="text-right"><span class="text-3xl font-black text-gray-800">${currentStepIndex + 1}</span><span class="text-gray-300 font-bold text-xl">/ 10</span></div>
                        </div>
                        <div class="text-center py-16 px-8 bg-gray-50 rounded-[2.5rem] mb-10 border-b-8 border-gray-100 shadow-inner">
                            <h2 class="text-3xl md:text-4xl font-bold text-gray-800 leading-relaxed">${q.q}</h2>
                        </div>
                        <div class="mb-10 relative">
                            <input type="text" id="answerInput" 
                                class="w-full p-6 bg-white border-4 border-gray-100 rounded-3xl text-4xl text-center focus:border-green-400 outline-none transition-all shadow-sm" 
                                placeholder="在此輸入答案" 
                                autocomplete="off">
                        </div>
                        <button onclick="submitAnswer()" class="w-full bg-green-600 text-white py-5 rounded-3xl text-xl font-bold btn-hover shadow-lg">確定送出</button>
                    </div>
                `;
                
                setTimeout(() => {
                    const input = document.getElementById('answerInput');
                    if(input) {
                        input.focus();
                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') submitAnswer();
                        });
                    }
                }, 100);
            } else if (currentState === 'result') {
                container.style.maxWidth = "42rem";
                container.innerHTML = `
                    <div class="text-center py-6 flex flex-col flex-grow justify-center">
                        <div class="text-7xl mb-6">🎯</div>
                        <h2 class="text-2xl font-bold text-gray-800">練習完成！(第 ${currentBatchIndex + 1} 組)</h2>
                        <div class="text-8xl font-black text-green-600 mb-8">${score * 10}</div>
                        <div class="text-left bg-gray-50 p-6 rounded-[2rem] mb-8 max-h-60 overflow-y-auto custom-scrollbar border border-gray-100">
                            ${userAnswers.map((ua, i) => `
                                <div class="flex justify-between items-center py-3 border-b border-gray-200 last:border-0">
                                    <span class="text-sm text-gray-700 font-medium">${currentGameQuestions[i].q}</span>
                                    <span class="text-sm font-bold ${ua.isCorrect ? 'text-green-600' : 'text-red-500'}">${ua.isCorrect ? '答對' : '正解：' + currentGameQuestions[i].a}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="playNextBatch()" class="bg-green-600 text-white py-4 rounded-3xl text-lg font-bold btn-hover shadow-lg">再玩一次 (下組)</button>
                            <button onclick="goHome()" class="bg-gray-200 text-gray-700 py-4 rounded-3xl text-lg font-bold btn-hover">回主選單</button>
                        </div>
                    </div>
                `;
            }
        }

        function goHome() { currentState = 'start'; feedbackState = null; render(); }
        function goSettings() { currentState = 'settings'; feedbackState = null; render(); }

        /**
         * 啟動指定組別的遊戲
         */
        function startGame(batchIdx) {
            currentBatchIndex = batchIdx;
            const startIdx = currentBatchIndex * 5;
            currentGameQuestions = [
                ...conversionPool.slice(startIdx, startIdx + 5),
                ...comparisonPool.slice(startIdx, startIdx + 5)
            ];
            currentState = 'game';
            currentStepIndex = 0; score = 0; userAnswers = []; feedbackState = null; render();
        }

        /**
         * 自動輪替到下一組題庫
         */
        function playNextBatch() {
            // 輪替邏輯：0 -> 1 -> 2 -> 3 -> 4 -> 0
            let nextIdx = currentBatchIndex + 1;
            if (nextIdx >= 5) nextIdx = 0; 
            startGame(nextIdx);
        }

        function submitAnswer() {
            const input = document.getElementById('answerInput');
            if (!input) return;
            const userVal = input.value.trim().replace(/\s+/g, '');
            if (userVal === "") return;

            const correctVal = currentGameQuestions[currentStepIndex].a.trim().replace(/\s+/g, '');
            const isCorrect = (userVal === correctVal);
            if (isCorrect) score++;
            
            userAnswers.push({ userVal, isCorrect });

            feedbackState = {
                isCorrect: isCorrect,
                correctAnswer: correctVal
            };
            render();
        }

        function nextStep() {
            feedbackState = null;
            if (currentStepIndex < 9) {
                currentStepIndex++;
                render();
            } else {
                currentState = 'result';
                render();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
